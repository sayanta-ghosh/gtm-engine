version: "3.9"

services:
  # ── PostgreSQL (simulates Aurora Serverless v2 locally) ──
  postgres:
    image: postgres:15-alpine
    container_name: nrev_lite-postgres
    environment:
      POSTGRES_DB: nrev_lite
      POSTGRES_USER: nrev_lite
      POSTGRES_PASSWORD: nrev_lite_local_dev
    ports:
      - "5432:5432"
    volumes:
      - nrev_lite_pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrev_lite -d nrev_lite"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis (simulates ElastiCache locally) ──
  redis:
    image: redis:7-alpine
    container_name: nrev_lite-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── nrev_lite API Server ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: nrev_lite-api
    environment:
      DATABASE_URL: postgresql+asyncpg://nrev_lite:nrev_lite_local_dev@postgres:5432/nrev_lite
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app/server
    command: uvicorn server.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  nrev_lite_pgdata:
