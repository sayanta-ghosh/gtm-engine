name: Deploy Staging K8s

on:
  push:
    branches:
      - staging

permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::979176640062:role/github-action-role
          aws-region: ap-south-1
          mask-aws-account-id: 'false'

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 979176640062.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build --no-cache --platform linux/amd64 -t gtm-engine-staging . -f ./Dockerfile.server
          docker tag gtm-engine-staging:latest 979176640062.dkr.ecr.ap-south-1.amazonaws.com/gtm-engine-staging:latest
          docker push 979176640062.dkr.ecr.ap-south-1.amazonaws.com/gtm-engine-staging:latest

      - name: Deploy to Kubernetes
        run: |
          aws eks update-kubeconfig --name staging-eks --region ap-south-1
          kubectl rollout restart deploy nrv-api -n staging
